# =============================================================================
# docker-compose.prod.yml — Ambiente de PRODUÇÃO
#
# Diferenças do dev:
# - Usa imagens completas (estágio "runner" — leve e otimizado)
# - Sem volumes de código (imagem contém tudo)
# - Sem hot reload
# - Variáveis de ambiente via secrets ou .env de produção
# - Recursos limitados por container (evita que um serviço consuma tudo)
#
# Como usar em produção:
#   docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    # Em produção, NÃO expor porta para o host — só acessível internamente
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis_prod
    restart: always
    volumes:
      - redis_data_prod:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: runner   # imagem leve de produção
      args:
        - NODE_ENV=production
    container_name: portfolio_api_prod
    restart: always
    expose:
      - '3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      RAWG_API_KEY: ${RAWG_API_KEY}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    container_name: portfolio_web_prod
    restart: always
    ports:
      - '3000:3000'   # Expõe só o frontend — API fica atrás do Nginx
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
