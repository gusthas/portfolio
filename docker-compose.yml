# =============================================================================
# docker-compose.yml — Ambiente de DESENVOLVIMENTO
#
# Sobe todos os serviços necessários para rodar o projeto localmente.
# Next.js e NestJS rodam com HOT RELOAD (código atualiza sem reiniciar).
# PostgreSQL e Redis rodam como serviços isolados.
#
# Como usar:
#   docker-compose up              → sobe tudo
#   docker-compose up -d           → sobe em background
#   docker-compose up postgres redis → sobe só o banco e cache
#   docker-compose logs -f api     → logs em tempo real da API
#   docker-compose down            → para tudo
#   docker-compose down -v         → para tudo E apaga os volumes (banco zerado)
# =============================================================================

version: '3.9'

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL — Banco de dados relacional
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: portfolio
    ports:
      - '5432:5432'   # host:container — acessa via localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data  # persiste dados entre restarts
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # REDIS — Cache e filas de jobs
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # persistência de dados
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # API — NestJS Backend
  # Em desenvolvimento, monta o código como volume para hot reload
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: builder  # usa o estágio "builder" em dev (tem devDeps para watch)
    container_name: portfolio_api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@postgres:5432/portfolio
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      RAWG_API_KEY: ${RAWG_API_KEY}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
    volumes:
      - ./apps/api/src:/app/apps/api/src    # hot reload
      - ./packages:/app/packages             # hot reload do design system
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter @portfolio/api dev

  # ---------------------------------------------------------------------------
  # WEB — Next.js Frontend
  # Em desenvolvimento, roda com next dev para hot reload
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: builder
    container_name: portfolio_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages:/app/packages
    depends_on:
      - api
    command: pnpm --filter @portfolio/web dev

# ---------------------------------------------------------------------------
# VOLUMES — Dados persistidos entre restarts dos containers
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
